version: '3.8'

services:
  php:
    build: .
    container_name: lab9_php
    volumes:
      - ./www:/var/www/html
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    container_name: lab9_rabbit
    ports:
      - "5672:5672"   # Порт для PHP
      - "15672:15672" # Админка (guest/guest)

  nginx:
    image: nginx:alpine
    container_name: lab9_nginx
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php